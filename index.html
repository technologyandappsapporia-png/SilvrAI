<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SilvrAI - Day 1</title>
    <!-- Beautiful Modern UI Styling -->
    <script src="https://jsdelivr.net"></script>
    <style>
        /* Day 1: Smooth Liquid Gradient Effect */
        body {
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #311042, #020617);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        /* Day 1: Glowing Robot Avatar */
        .fluid-avatar {
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.4);
            animation: pulseGlow 3s ease-in-out infinite;
        }
        @keyframes pulseGlow {
            0%, 100% { transform: scale(1); box-shadow: 0 0 30px rgba(168, 85, 247, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 50px rgba(168, 85, 247, 0.7); }
        }
    </style>
</head>
<body class="h-screen text-white flex flex-col justify-between p-6 overflow-hidden select-none">

    <!-- Top Bar: Logo & Dopamine Points Tracker -->
    <div class="flex justify-between items-center mt-4">
        <h1 class="text-3xl font-extrabold tracking-wider bg-clip-text text-transparent bg-gradient-to-r from-white to-slate-400">SilvrAI</h1>
        <div class="bg-white/10 backdrop-blur-md px-4 py-1.5 rounded-full border border-white/10">
            <span class="text-purple-400 font-bold text-lg">✨ <span id="pointsDisplay">0</span> DP</span>
        </div>
    </div>

    <!-- Center Zone: Fluid Robot Avatar -->
    <div class="flex flex-col items-center justify-center flex-1">
        <div id="avatar" class="fluid-avatar w-36 h-36 rounded-full bg-purple-600/20 border-2 border-purple-500 flex items-center justify-center text-6xl transition-transform duration-100 active:scale-90">
            🤖
        </div>
        <p class="text-slate-400 mt-8 text-lg font-medium text-center tracking-wide">How is your energy right now?</p>
    </div>

    <!-- Bottom Action Buttons -->
    <div class="flex gap-4 mb-6">
        <button onclick="handleMood('Calm', 10, '😌')" class="flex-1 py-4 bg-cyan-500 rounded-2xl font-bold text-lg shadow-lg shadow-cyan-500/20 active:scale-95 transition-transform text-white">
            Calm (+10)
        </button>
        <button onclick="handleMood('Creative', 20, '✨')" class="flex-1 py-4 bg-pink-500 rounded-2xl font-bold text-lg shadow-lg shadow-pink-500/20 active:scale-95 transition-transform text-white">
            Creative (+20)
        </button>
    </div>

    <!-- Day 1 Core Logic -->
    <script>
        let totalPoints = 0;
        const pointsDisplay = document.getElementById('pointsDisplay');
        const avatar = document.getElementById('avatar');

        function handleMood(mood, points, emoji) {
            totalPoints += points;
            pointsDisplay.innerText = totalPoints;
            avatar.innerText = emoji;

            // 1.5 seconds baad avatar wapas normal ho jaye ga
            setTimeout(() => {
                avatar.innerText = '🤖';
            }, 1500);
        }
    </script>
</body>
</html>
