<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SilvrAI - Day 2</title>
    <style>
        /* Day 1 Core Styles Ke Sath Day 2 Ka Balance */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body {
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #311042, #020617);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 24px;
            overflow-y: auto; /* Day 2 me list lambi ho sakti hai isliye scroll on kiya */
            user-select: none;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; margin-bottom: 24px; }
        .logo { font-size: 28px; font-weight: 800; letter-spacing: 1px; color: #f8fafc; }
        .points-box { background: rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 9999px; border: 1px solid rgba(255,255,255,0.1); }
        .points-text { color: #c084fc; font-weight: bold; font-size: 18px; }
        
        .center-zone { display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 24px; }
        .fluid-avatar {
            width: 130px; height: 130px; border-radius: 50%;
            background: rgba(168, 85, 247, 0.2); border: 2px solid #a855f7;
            display: flex; align-items: center; justify-content: center; font-size: 55px;
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.4);
            animation: pulseGlow 3s ease-in-out infinite;
            transition: transform 0.1s;
        }
        .fluid-avatar:active { transform: scale(0.9); }
        @keyframes pulseGlow {
            0%, 100% { transform: scale(1); box-shadow: 0 0 30px rgba(168, 85, 247, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 50px rgba(168, 85, 247, 0.7); }
        }
        .status-text { color: #94a3b8; margin-top: 20px; font-size: 16px; font-weight: 500; text-align: center; }
        
        .button-row { display: flex; gap: 16px; margin-bottom: 32px; }
        .btn { flex: 1; padding: 14px 0; border: none; border-radius: 16px; font-weight: bold; font-size: 16px; color: white; transition: transform 0.1s; cursor: pointer; }
        .btn:active { transform: scale(0.95); }
        .btn-calm { background: #06b6d4; box-shadow: 0 10px 15px -3px rgba(6, 182, 212, 0.3); }
        .btn-creative { background: #ec4899; box-shadow: 0 10px 15px -3px rgba(236, 72, 153, 0.3); }

        /* === 📋 DAY 2 NEW STYLES: Tasks List Box === */
        .quest-container { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); padding: 20px; border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.1); margin-bottom: 16px; }
        .quest-title { font-size: 18px; font-weight: bold; color: #c084fc; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .task-box { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.2); padding: 12px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 12px; transition: all 0.3s; }
        .task-text { font-size: 14px; color: #cbd5e1; }
        .claim-btn { background: #a855f7; color: white; border: none; padding: 8px 14px; border-radius: 12px; font-size: 12px; font-weight: bold; cursor: pointer; transition: transform 0.1s; }
        .claim-btn:active { transform: scale(0.9); }
        .claim-btn:disabled { background: #475569; color: #94a3b8; cursor: not-allowed; }
    </style>
</head>
<body>

    <!-- Day 1 Features Continued -->
    <div class="top-bar">
        <div class="logo">SilvrAI</div>
        <div class="points-box">
            <span class="points-text">✨ <span id="pointsDisplay">0</span> DP</span>
        </div>
    </div>

    <div class="center-zone">
        <div id="avatar" class="fluid-avatar">🤖</div>
        <p class="status-text">How is your energy right now?</p>
    </div>

    <div class="button-row">
        <button onclick="handleMood('Calm', 10, '😌')" class="btn btn-calm">Calm (+10)</button>
        <button onclick="handleMood('Creative', 20, '✨')" class="btn btn-creative">Creative (+20)</button>
    </div>

    <!-- === 📋 DAY 2 FEATURE: Daily Life RPG Quests Section === -->
    <div class="quest-container">
        <div class="quest-title">⚔️ Daily Quests</div>
        
        <!-- Task 1 -->
        <div class="task-box" id="task1Box">
            <span class="task-text">💧 Drink 8 Glasses of Water</span>
            <button onclick="completeTask('task1Box', 50)" class="claim-btn">Claim +50 DP</button>
        </div>
        
        <!-- Task 2 -->
        <div class="task-box" id="task2Box">
            <span class="task-text">📚 Code / Learn for 15 Mins</span>
            <button onclick="completeTask('task2Box', 100)" class="claim-btn">Claim +100 DP</button>
        </div>
    </div>

    <!-- Core App Logic (Day 1 + Day 2 Combined) -->
    <script>
        let totalPoints = 0;
        const pointsDisplay = document.getElementById('pointsDisplay');
        const avatar = document.getElementById('avatar');

        // Day 1 Logic
        function handleMood(mood, points, emoji) {
            totalPoints += points;
            pointsDisplay.innerText = totalPoints;
            avatar.innerText = emoji;
            setTimeout(() => { avatar.innerText = '🤖'; }, 1500);
        }

        // === 🧠 DAY 2 NEW LOGIC: Task Completion ===
        function completeTask(boxId, bonusPoints) {
            const taskBox = document.getElementById(boxId);
            const btn = taskBox.querySelector('.claim-btn');
            
            // Task completed effect
            taskBox.style.opacity = '0.4';
            taskBox.style.border = '1px solid rgba(34, 197, 94, 0.3)'; // Green border hint
            btn.disabled = true;
            btn.innerText = '✅ Done';
            
            // Robot reaction to task success
            avatar.innerText = '🚀';
            setTimeout(() => { avatar.innerText = '🤖'; }, 1200);

            // Add points
            totalPoints += bonusPoints;
            pointsDisplay.innerText = totalPoints;
        }
    </script>
</body>
</html>
