<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SilvrAI - Day 1 Fix</title>
    <style>
        /* CSS se design ko pakka aur responsive banana */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body {
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #311042, #020617);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            height: 100vh;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 24px;
            overflow: hidden;
            user-select: none;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; }
        .logo { font-size: 28px; font-weight: 800; letter-spacing: 1px; color: #f8fafc; }
        .points-box { background: rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 9999px; border: 1px solid rgba(255,255,255,0.1); }
        .points-text { color: #c084fc; font-weight: bold; font-size: 18px; }
        .center-zone { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; }
        .fluid-avatar {
            width: 144px; height: 144px; border-radius: 50%;
            background: rgba(168, 85, 247, 0.2); border: 2px solid #a855f7;
            display: flex; align-items: center; justify-content: center; font-size: 60px;
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.4);
            animation: pulseGlow 3s ease-in-out infinite;
            transition: transform 0.1s;
        }
        .fluid-avatar:active { transform: scale(0.9); }
        @keyframes pulseGlow {
            0%, 100% { transform: scale(1); box-shadow: 0 0 30px rgba(168, 85, 247, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 50px rgba(168, 85, 247, 0.7); }
        }
        .status-text { color: #94a3b8; margin-top: 32px; font-size: 18px; font-weight: 500; text-align: center; }
        .button-row { display: flex; gap: 16px; margin-bottom: 24px; }
        .btn { flex: 1; padding: 16px 0; border: none; border-radius: 16px; font-weight: bold; font-size: 18px; color: white; transition: transform 0.1s; cursor: pointer; }
        .btn:active { transform: scale(0.95); }
        .btn-calm { background: #06b6d4; box-shadow: 0 10px 15px -3px rgba(6, 182, 212, 0.3); }
        .btn-creative { background: #ec4899; box-shadow: 0 10px 15px -3px rgba(236, 72, 153, 0.3); }
    </style>
</head>
<body>

    <!-- Top Bar -->
    <div class="top-bar">
        <div class="logo">SilvrAI</div>
        <div class="points-box">
            <span class="points-text">✨ <span id="pointsDisplay">0</span> DP</span>
        </div>
    </div>

    <!-- Center Zone -->
    <div class="center-zone">
        <div id="avatar" class="fluid-avatar">🤖</div>
        <p class="status-text">How is your energy right now?</p>
    </div>

    <!-- Bottom Row -->
    <div class="button-row">
        <button onclick="handleMood('Calm', 10, '😌')" class="btn btn-calm">Calm (+10)</button>
        <button onclick="handleMood('Creative', 20, '✨')" class="btn btn-creative">Creative (+20)</button>
    </div>

    <script>
        let totalPoints = 0;
        const pointsDisplay = document.getElementById('pointsDisplay');
        const avatar = document.getElementById('avatar');

        function handleMood(mood, points, emoji) {
            totalPoints += points;
            pointsDisplay.innerText = totalPoints;
            avatar.innerText = emoji;
            setTimeout(() => { avatar.innerText = '🤖'; }, 1500);
        }
    </script>
</body>
</html>
